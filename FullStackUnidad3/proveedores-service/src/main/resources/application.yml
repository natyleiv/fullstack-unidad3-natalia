server:
  port: 0

spring:
  application:
    name: proveedores-service # Ej: clientes-service
  config:
    import: optional:configserver:http://config-server:8888
  datasource:
    # IMPORTANTE: mysql-db es el nombre del contenedor de Docker
    url: jdbc:mysql://mysql-db:3306/[NOMBRE_BD]?serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate # Obligatorio por rúbrica
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/